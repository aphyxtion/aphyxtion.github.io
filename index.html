<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aphyxtion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #fff;
      font-weight: 500;
      letter-spacing: -1px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .name {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 18px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      text-decoration: none;
      color: #111;
      font-size: 13.5px;
      font-weight: 400;
      transition: border-color 0.15s, background 0.15s;
      background: #fff;
    }

    .link-btn:hover {
      border-color: #bbb;
      background: #fafafa;
    }

    .link-btn .icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.75;
    }

    .link-btn .label {
      flex: 1;
    }

    .link-btn .arrow {
      font-size: 11px;
      color: #bbb;
    }

    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">A</div>
    <div class="name">Aphyxtion | 逆天</div>

    <div class="links">
      <!-- Spotify -->
      <a class="link-btn" href="spotify.html" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.496 17.28a.748.748 0 01-1.03.25c-2.82-1.725-6.368-2.114-10.548-1.157a.748.748 0 01-.334-1.459c4.572-1.045 8.49-.595 11.662 1.337a.748.748 0 01.25 1.029zm1.467-3.261a.936.936 0 01-1.287.308c-3.225-1.983-8.142-2.559-11.955-1.4a.937.937 0 01-.543-1.79c4.358-1.322 9.776-.682 13.478 1.594a.937.937 0 01.307 1.288zm.126-3.395c-3.868-2.297-10.244-2.508-13.938-1.387a1.123 1.123 0 01-.651-2.147c4.244-1.287 11.295-1.038 15.748 1.605a1.123 1.123 0 01-1.159 1.929z"/>
        </svg>
        <span class="label">Spotify</span>
        <span class="arrow">↗</span>
      </a>

      <!-- YouTube -->
      <a class="link-btn" href="https://youtube.com/@aphyxtion" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        <span class="label">YouTube</span>
        <span class="arrow">↗</span>
      </a>

      <!-- Twitter/X -->
      <a class="link-btn" href="https://x.com/Aphyxtion" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        <span class="label">Twitter / X</span>
        <span class="arrow">↗</span>
      </a>

      <!-- Instagram -->
      <a class="link-btn" href="https://www.instagram.com/aphyxtion" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
        <span class="label">Instagram</span>
        <span class="arrow">↗</span>
      </a>
    </div>


  </div>
</body>
</html>
